<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>돌잔치 모바일 초대장</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button class="music" id="musicBtn" type="button">♪</button>

  <div class="phone">
   <section class="hero">
  <video id="openingVideo" playsinline poster="./assets/opening_poster.jpg">
    <source src="./assets/intro.mp4" type="video/mp4">
  </video>

  <div class="hero-cover" id="heroCover">
    <div class="brand" id="brand"></div>
    <button class="start-btn" id="startBtn" type="button">초대장 보기</button>
  </div>

  <!--div class="date" id="heroDate"></div-->
</section>

    <section class="fade">
      <div class="title"><img src="./assets/invitation_text.png" alt="초대합니다" /></div>
      <p class="message" id="introMessage"></p>
      <p class="message" id="familyText"></p>
    </section>

    <!--section class="fade">
      <img class="photo" id="familyPhoto" alt="가족사진" />
      <p class="message" id="familyText"></p>
    </section-->

    <section class="fade">
      <div class="title"><img src="./assets/savethedate_text.png" alt="돌잔치 안내" /></div>
      <!--p class="message" id="eventInfo"></p-->
      <img class="photo" id="babyPhoto" alt="아기사진" />
      <h3 id="monthTitle"></h3>
      <div id="calendarWrap"></div>
    </section>

    <section class="fade">
      <div class="title"><img src="./assets/growingalbum_text.png" alt="성장 이야기" /></div>
      <div class="timeline" id="timeline"></div>
    </section>

    <section class="fade">
      <div class="title"><img src="./assets/gallery_text.png" alt="갤러리" /></div>
      <div class="gallery" id="gallery"></div>
    </section>

    <section class="fade">
      <div class="title"><img src="./assets/location_text.png" alt="오시는 길" /></div>
      <p class="message" id="locationText"></p>
      <div class="map">카카오맵 영역<br><span class="small">실제 배포 시 지도 이미지 또는 지도 API 삽입</span></div>
      <div class="buttons">
        <a class="btn fill" id="kakaoMap" target="_blank" rel="noopener">카카오맵</a>
        <a class="btn" id="naverMap" target="_blank" rel="noopener">네이버지도</a>
      </div>
    </section>

    <section class="fade">
      <div class="title"><img src="./assets/rsvp_text.png" alt="참석 여부 전달" /></div>
      <p class="message">참석 여부는 문자로 알려주세요.<br>성함과 참석 인원을 함께 남겨주시면 됩니다.</p>
      <div class="buttons">
        <a class="btn fill" id="smsBtn">문자로 알려주기</a>
      </div>
    </section>

    <section class="fade">
      <div class="title"><img src="./assets/account_text.png" alt="마음 전하실 곳" /></div>
      <div id="accounts"></div>
    </section>

    <section class="fade">
      <img class="photo" id="endingPhoto" alt="엔딩사진" />
      <p class="message">우리 꼭 만나요 ♡</p>
      <div class="buttons">
        <button class="btn" id="shareBtn" type="button">링크 공유</button>
      </div>
    </section>
  </div>

  <div class="float">
    <button type="button" id="topBtn">↑</button>
    <button type="button" id="callBtn">☎</button>
  </div>


  <div class="lightbox" id="photoLightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="사진 크게 보기 닫기">×</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" type="button" aria-label="이전 사진">‹</button>
    <figure class="lightbox-content">
      <img id="lightboxImage" src="" alt="크게 보기 사진" />
      <figcaption id="lightboxCaption"></figcaption>
    </figure>
    <button class="lightbox-nav lightbox-next" id="lightboxNext" type="button" aria-label="다음 사진">›</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
